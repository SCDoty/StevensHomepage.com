<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #131416;
            color: #e8eaed;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 28px 32px;
        }

        /* ── HEADER ── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        #greeting { font-size: 1.6rem; font-weight: 600; }
        #clock { font-size: 1.1rem; color: #9aa0a6; }

        /* ── SEARCH BAR ── */
        #search-form {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 0 20px;
            margin-bottom: 24px;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        #search-form:focus-within {
            background: rgba(255,255,255,0.11);
            border-color: rgba(138,180,248,0.5);
            box-shadow: 0 0 0 3px rgba(138,180,248,0.15);
        }
        #search-icon { font-size: 1.1rem; color: #9aa0a6; margin-right: 12px; flex-shrink: 0; }
        #search-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #e8eaed;
            font-size: 1rem;
            padding: 14px 0;
        }
        #search-input::placeholder { color: #5f6368; }

        /* ── WEATHER WIDGET ── */
        #weather-widget {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 0;
        }
        #weather-current {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            padding-right: 16px;
            border-right: 1px solid rgba(255,255,255,0.08);
            margin-right: 16px;
        }
        #weather-icon { font-size: 1.5rem; line-height: 1; }
        #weather-temp { font-size: 1.4rem; font-weight: 700; }
        #weather-desc { font-size: 0.75rem; color: #9aa0a6; }
        #weather-location { display: none; }
        #hourly-label { display: none; }
        #hourly-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 2px;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: #3c4043 transparent;
        }
        #hourly-scroll::-webkit-scrollbar { height: 3px; }
        #hourly-scroll::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 2px; }
        .hour-card {
            flex: 0 0 auto;
            text-align: center;
            min-width: 46px;
            padding: 2px 4px;
        }
        .hour-time { font-size: 0.65rem; color: #9aa0a6; }
        .hour-icon { font-size: 1rem; margin: 2px 0; }
        .hour-temp { font-size: 0.8rem; font-weight: 600; }
        .hour-precip { font-size: 0.6rem; color: #8ab4f8; margin-top: 1px; }
        #weather-error { color: #9aa0a6; font-size: 0.9rem; }

        /* ── COUNTDOWNS ── */
        #countdowns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        .countdown-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 18px 22px;
            position: relative;
            overflow: hidden;
        }
        .countdown-card.f1 { border-color: rgba(230,0,0,0.3); }
        .countdown-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .countdown-card.f1::before { background: linear-gradient(90deg, #e60000, #ff6b6b); }

        .cd-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .cd-badge { font-size: 1.6rem; line-height: 1; }
        .cd-sport {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #5f6368;
        }
        .cd-competition { font-size: 0.85rem; color: #9aa0a6; margin-top: 1px; }

        .cd-event { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
        .cd-sub { font-size: 0.82rem; color: #9aa0a6; margin-bottom: 14px; }

        .cd-timer {
            display: flex;
            gap: 12px;
        }
        .cd-unit {
            text-align: center;
            min-width: 44px;
        }
        .cd-num {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .countdown-card.f1 .cd-num { color: #ff6b6b; }
        .countdown-card.lfc .cd-num { color: #ff6b84; }
        .cd-lbl { font-size: 0.65rem; text-transform: uppercase; color: #5f6368; letter-spacing: 0.06em; margin-top: 3px; }

        .cd-live {
            display: inline-block;
            background: #c8102e;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 2px 8px;
            border-radius: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

        .cd-loading { color: #5f6368; font-size: 0.85rem; }

        /* ── LINKS SECTION ── */
        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #5f6368;
            margin-bottom: 14px;
        }
        #card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 14px;
        }
        .site-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 20px 12px 16px;
            text-align: center;
            text-decoration: none;
            color: #e8eaed;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .site-card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.09);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .site-card img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #303134;
        }
        .site-card span { font-size: 0.85rem; font-weight: 500; color: #c4c7cc; }
    </style>
</head>
<body>

    <div id="header">
        <div id="greeting">Good morning</div>
        <div id="clock"></div>
    </div>

    <form id="search-form" action="https://www.google.com/search" method="get" target="_blank">
        <span id="search-icon">🔍</span>
        <input id="search-input" type="text" name="q" placeholder="Search Google..." autocomplete="off">
    </form>

    <div id="weather-widget">
        <p id="weather-error">Fetching weather...</p>
    </div>

    <div id="countdowns">
        <div class="countdown-card f1" id="f1-card">
            <div class="cd-top">
                <div class="cd-badge">🏎️</div>
                <div>
                    <div class="cd-sport">Formula 1</div>
                    <div class="cd-competition" id="f1-competition">—</div>
                </div>
            </div>
            <div class="cd-event" id="f1-event"><span class="cd-loading">Loading...</span></div>
            <div class="cd-sub" id="f1-sub"></div>
            <div class="cd-timer" id="f1-timer"></div>
        </div>

    </div>

    <div class="section-label">Quick Links</div>
    <div id="card-grid">
        <a class="site-card" href="https://www.claude.ai/" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=claude.ai&sz=64" alt="">
            <span>Claude AI</span>
        </a>
        <a class="site-card" href="https://www.peacocktv.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=peacocktv.com&sz=64" alt="">
            <span>Peacock</span>
        </a>
        <a class="site-card" href="https://www.fubo.tv" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=fubo.tv&sz=64" alt="">
            <span>FuboTV</span>
        </a>
        <a class="site-card" href="https://www.reddit.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=reddit.com&sz=64" alt="">
            <span>Reddit</span>
        </a>
        <a class="site-card" href="https://www.onefootball.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=onefootball.com&sz=64" alt="">
            <span>OneFootball</span>
        </a>
        <a class="site-card" href="https://www.paramountplus.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=paramountplus.com&sz=64" alt="">
            <span>Paramount+</span>
        </a>
        <a class="site-card" href="https://www.crunchyroll.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=crunchyroll.com&sz=64" alt="">
            <span>Crunchyroll</span>
        </a>
        <a class="site-card" href="https://www.netflix.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=netflix.com&sz=64" alt="">
            <span>Netflix</span>
        </a>
        <a class="site-card" href="https://f1tv.formula1.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=f1tv.formula1.com&sz=64" alt="">
            <span>F1 TV</span>
        </a>
        <a class="site-card" href="https://www.twitch.tv" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=twitch.tv&sz=64" alt="">
            <span>Twitch</span>
        </a>
    </div>

    <script>
        // ── CLOCK & GREETING ──
        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes().toString().padStart(2,'0');
            document.getElementById('clock').textContent =
                `${(h % 12) || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
            document.getElementById('greeting').textContent =
                h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
        }
        updateClock();
        setInterval(updateClock, 30000);

        // ── WEATHER ──
        function weatherInfo(code, isDay) {
            if (code === 0)  return { icon: isDay ? '☀️' : '🌙', desc: 'Clear' };
            if (code <= 2)   return { icon: '⛅', desc: 'Partly cloudy' };
            if (code === 3)  return { icon: '☁️', desc: 'Overcast' };
            if (code <= 49)  return { icon: '🌫️', desc: 'Foggy' };
            if (code <= 55)  return { icon: '🌦️', desc: 'Drizzle' };
            if (code <= 65)  return { icon: '🌧️', desc: 'Rain' };
            if (code <= 77)  return { icon: '❄️', desc: 'Snow' };
            if (code <= 82)  return { icon: '🌧️', desc: 'Rain showers' };
            if (code <= 86)  return { icon: '🌨️', desc: 'Snow showers' };
            if (code <= 99)  return { icon: '⛈️', desc: 'Thunderstorm' };
            return { icon: '🌡️', desc: 'Unknown' };
        }

        function loadWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                `&current=temperature_2m,weathercode,is_day,windspeed_10m` +
                `&hourly=temperature_2m,weathercode,precipitation_probability` +
                `&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto&forecast_days=1`;
            fetch(url).then(r => r.json()).then(data => {
                const cur = data.current;
                const info = weatherInfo(cur.weathercode, cur.is_day);
                const temp = Math.round(cur.temperature_2m);
                const wind = Math.round(cur.windspeed_10m);
                const currentHour = new Date().getHours();
                const { time: times, temperature_2m: temps, weathercode: codes, precipitation_probability: precips } = data.hourly;

                let hourlyHTML = '';
                for (let i = 0; i < times.length; i++) {
                    const t = new Date(times[i]);
                    if (t.getHours() < currentHour) continue;
                    const hInfo = weatherInfo(codes[i], t.getHours() >= 6 && t.getHours() < 20 ? 1 : 0);
                    const label = t.getHours() === currentHour ? 'Now'
                        : t.toLocaleTimeString([], { hour: 'numeric', hour12: true });
                    const precip = precips[i] > 0 ? `<div class="hour-precip">${precips[i]}%</div>` : '';
                    hourlyHTML += `<div class="hour-card">
                        <div class="hour-time">${label}</div>
                        <div class="hour-icon">${hInfo.icon}</div>
                        <div class="hour-temp">${Math.round(temps[i])}°</div>
                        ${precip}
                    </div>`;
                }
                document.getElementById('weather-widget').innerHTML = `
                    <div id="weather-current">
                        <div id="weather-icon">${info.icon}</div>
                        <div>
                            <div id="weather-temp">${temp}°F</div>
                            <div id="weather-desc">${info.desc} · ${wind} mph</div>
                        </div>
                    </div>
                    <div id="hourly-scroll">${hourlyHTML}</div>`;
            }).catch(() => {
                document.getElementById('weather-widget').innerHTML =
                    '<p id="weather-error">Could not load weather data.</p>';
            });
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => loadWeather(pos.coords.latitude, pos.coords.longitude),
                () => { document.getElementById('weather-widget').innerHTML =
                    '<p id="weather-error">Enable location access to see weather.</p>'; }
            );
        } else {
            document.getElementById('weather-widget').innerHTML =
                '<p id="weather-error">Geolocation not supported.</p>';
        }

        // ── COUNTDOWN HELPERS ──
        function pad(n) { return String(n).padStart(2, '0'); }

        function renderTimer(elId, targetDate) {
            const el = document.getElementById(elId);
            if (!el) return;

            function tick() {
                const diff = targetDate - Date.now();
                if (diff <= 0) {
                    el.innerHTML = '<span class="cd-live">LIVE NOW</span>';
                    return;
                }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.innerHTML = `
                    <div class="cd-unit"><div class="cd-num">${pad(d)}</div><div class="cd-lbl">Days</div></div>
                    <div class="cd-unit"><div class="cd-num">${pad(h)}</div><div class="cd-lbl">Hrs</div></div>
                    <div class="cd-unit"><div class="cd-num">${pad(m)}</div><div class="cd-lbl">Min</div></div>
                    <div class="cd-unit"><div class="cd-num">${pad(s)}</div><div class="cd-lbl">Sec</div></div>`;
            }
            tick();
            setInterval(tick, 1000);
        }

        // ── F1 NEXT RACE ──
        fetch('https://api.jolpi.ca/ergast/f1/current/next.json')
            .then(r => r.json())
            .then(data => {
                const race = data.MRData.RaceTable.Races[0];
                if (!race) return;
                document.getElementById('f1-event').textContent = race.raceName;
                document.getElementById('f1-competition').textContent = 'FIA Formula One World Championship';
                const timeStr = race.time ? race.time.replace('Z', '') : '00:00:00';
                const raceDate = new Date(`${race.date}T${timeStr}Z`);
                const localDate = raceDate.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
                const localTime = raceDate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                document.getElementById('f1-sub').textContent =
                    `${race.Circuit.circuitName} · ${localDate} at ${localTime}`;
                renderTimer('f1-timer', raceDate);
            })
            .catch(() => {
                document.getElementById('f1-event').textContent = 'Could not load race data';
            });

    </script>
</body>
</html>
