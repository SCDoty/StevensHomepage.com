<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header">
        <div id="greeting">Good morning</div>
        <div id="clock"></div>
    </div>

    <form id="search-form" action="https://www.google.com/search" method="get" target="_blank">
        <span id="search-icon">🔍</span>
        <input id="search-input" type="text" name="q" placeholder="Search Google..." autocomplete="off">
    </form>

    <div class="section-label">Quick Links</div>
    <div id="card-grid">
        <a class="site-card" href="https://www.claude.ai/" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=claude.ai&sz=48" alt="">
            <span>Claude AI</span>
        </a>
        <a class="site-card" href="https://www.crunchyroll.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=crunchyroll.com&sz=48" alt="">
            <span>Crunchyroll</span>
        </a>
        <a class="site-card" href="https://eitm-archives.com/show-archives/" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=eitm-archives.com&sz=48" alt="">
            <span>EITM Archive</span>
        </a>
        <a class="site-card" href="https://f1tv.formula1.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=f1tv.formula1.com&sz=48" alt="">
            <span>F1 TV</span>
        </a>
        <a class="site-card" href="https://www.fubo.tv" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=fubo.tv&sz=48" alt="">
            <span>FuboTV</span>
        </a>
        <a class="site-card" href="https://mail.google.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=mail.google.com&sz=48" alt="">
            <span>GMail</span>
        </a>
        <a class="site-card" href="https://www.netflix.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=netflix.com&sz=48" alt="">
            <span>Netflix</span>
        </a>
        <a class="site-card" href="https://www.onefootball.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=onefootball.com&sz=48" alt="">
            <span>OneFootball</span>
        </a>
        <a class="site-card" href="https://www.paramountplus.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=paramountplus.com&sz=48" alt="">
            <span>Paramount+</span>
        </a>
        <a class="site-card" href="https://www.peacocktv.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=peacocktv.com&sz=48" alt="">
            <span>Peacock</span>
        </a>
        <a class="site-card" href="https://old.reddit.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=reddit.com&sz=48" alt="">
            <span>Reddit</span>
        </a>
        <a class="site-card" href="https://www.tenor.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=tenor.com&sz=48" alt="">
            <span>Tenor</span>
        </a>
        <a class="site-card" href="https://www.twitch.tv" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=twitch.tv&sz=48" alt="">
            <span>Twitch</span>
        </a>
        <a class="site-card" href="https://www.youtube.com" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=48" alt="">
            <span>YouTube</span>
        </a>
    </div>

    <div id="weather-widget">
        <p id="weather-error">Fetching weather...</p>
    </div>

    <div id="metro-alert">
        <div id="metro-alert-header">
            <span class="metro-badge">ORANGE LINE</span>
            <span id="metro-alert-title">Service Alert</span>
        </div>
        <ul id="metro-alert-list"></ul>
    </div>

    <div id="countdowns">
        <div class="countdown-card f1" id="f1-card">
            <div class="cd-top">
                <div class="cd-badge">🏎️</div>
                <div>
                    <div class="cd-sport">Formula 1</div>
                    <div class="cd-competition" id="f1-competition">—</div>
                </div>
            </div>
            <div class="cd-event" id="f1-event"><span class="cd-loading">Loading...</span></div>
            <div class="cd-sub" id="f1-sub"></div>
            <div class="cd-timer" id="f1-timer"></div>
        </div>

        <div class="countdown-card lfc" id="lfc-card">
            <div class="cd-top">
                <div class="cd-badge">⚽</div>
                <div>
                    <div class="cd-sport">Liverpool FC</div>
                    <div class="cd-competition" id="lfc-competition">—</div>
                </div>
            </div>
            <div class="cd-event" id="lfc-event"><span class="cd-loading">Loading...</span></div>
            <div class="cd-sub" id="lfc-sub"></div>
            <div class="cd-timer" id="lfc-timer"></div>
        </div>
    </div>

    <script src="clock.js"></script>
    <script src="weather.js"></script>
    <script src="metro.js"></script>
    <script src="countdowns.js"></script>
</body>
</html>
